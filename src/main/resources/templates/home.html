<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestro Álbum - Kuromi Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --kuromi-negro: #1a1a1a;
            --kuromi-morado: #7b2cbf;
            --kuromi-rosa: #ff758f;
            --fondo: #f7d9e3;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--fondo);
            /* Patrón de fondo sutil */
            background-image: url("https://www.transparenttextures.com/patterns/cubes.png");
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Encaje decorativo estilo Gótico en bordes */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 100%;
            height: 20px;
            background-image: radial-gradient(circle at 10px 15px, transparent 12px, var(--kuromi-negro) 13px);
            background-size: 20px 20px;
            z-index: 1000;
        }
        body::before { top: 0; }
        body::after { bottom: 0; transform: rotate(180deg); }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 3.5rem;
            border-radius: 20px;
            /* Sombra sólida morada */
            box-shadow: 15px 15px 0px var(--kuromi-morado);
            text-align: center;
            max-width: 480px;
            border: 4px solid var(--kuromi-negro);
            position: relative;
            animation: fadeIn 1.2s ease-out;
            z-index: 5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Contenedor para alinear Kuromis y Título */
        .header-kuromi {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        /* Estilo Sticker para las fotos pequeñas */
        .mini-kuromi {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 50%; /* Las hace circulares */
            border: 3px solid white;
            filter: drop-shadow(4px 4px 0px var(--kuromi-morado));
            animation: flotar 2s infinite alternate ease-in-out;
        }

        @keyframes flotar {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: var(--kuromi-negro);
            font-size: 3.2rem;
            margin: 0;
            text-shadow: 3px 3px var(--kuromi-morado);
        }

        p {
            color: var(--kuromi-negro);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            line-height: 1.4;
        }

        .btn-entrar {
            background-color: var(--kuromi-negro);
            color: white;
            padding: 18px 45px;
            text-decoration: none;
            border-radius: 0px;
            font-weight: 600;
            display: inline-block;
            transition: all 0.3s ease;
            border: 2px solid var(--kuromi-morado);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .btn-entrar:hover {
            background-color: var(--kuromi-morado);
            transform: translate(-5px, -5px);
            box-shadow: 5px 5px 0px var(--kuromi-negro);
        }

        /* Kuromi asomándose con efecto de inclinación */
        .kuromi-sticker {
            position: absolute;
            width: 130px;
            height: auto;
            bottom: -60px;
            right: -30px;
            transform: rotate(15deg);
            z-index: 10;
            border: 4px solid white;
            border-radius: 15px;
            box-shadow: 10px 10px 0px rgba(0,0,0,0.1);
            transition: 0.4s ease;
        }

        .kuromi-sticker:hover {
            transform: rotate(0deg) scale(1.1);
            bottom: -50px;
        }

        /* Animación de corazones y calaveras */
        .caida {
            position: fixed;
            top: -10%;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            animation: caer linear forwards;
        }

        @keyframes caer {
            to { transform: translateY(110vh) rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 3rem; margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--kuromi-rosa));">💀</div>

    <div class="header-kuromi">
        <img src="/images/kuromi1.jpg" class="mini-kuromi" style="transform: scaleX(-1);" alt="Kuromi 1">

        <h1>Nuestra Historia</h1>

        <img src="/images/kuromi2.jpg" class="mini-kuromi" alt="Kuromi 2">
    </div>

    <p>Porque aunque seamos un poco "malvados", nuestro amor es lo más dulce que existe.</p>

    <a href="/album" class="btn-entrar">Abrir el Álbum</a>

    <img src="/images/kuromi3.jpg" class="kuromi-sticker" alt="Kuromi 3">
</div>

<script>
    // Generador de lluvia de elementos decorativos
    function crearElemento() {
        const elementos = ['🖤', '💜', '💀', '💖', '🎀'];
        const item = document.createElement('div');
        item.classList.add('caida');
        item.innerHTML = elementos[Math.floor(Math.random() * elementos.length)];

        item.style.left = Math.random() * 100 + 'vw';
        item.style.fontSize = Math.random() * 20 + 20 + 'px';
        const duracion = Math.random() * 3 + 2;
        item.style.animationDuration = duracion + 's';
        item.style.opacity = Math.random();

        document.body.appendChild(item);

        setTimeout(() => {
            item.remove();
        }, duracion * 1000);
    }

    setInterval(crearElemento, 300);
</script>
</body>
</html>
